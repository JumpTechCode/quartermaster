name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 5 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          build-mode: none
      - name: analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"
